<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>内容导航</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>内容导航</h1>
            <p>选择你想前往的目的地</p>
        </div>

        <div class="nav-list">
            <div class="nav-item" onclick="handleNavigation('bili', '水喝千束', 'https://b23.tv/1NE6ycz')">
                <div class="item-info">
                    <div class="dot" style="background-color: var(--accent-bili);"></div>
                    <span class="label">哔哩哔哩-水喝千束</span>
                </div>
                <span class="arrow">∟</span>
            </div>

            <div class="nav-item" onclick="handleNavigation('bili', '次放Studio', 'https://b23.tv/o7b2x5u')">
                <div class="item-info">
                    <div class="dot" style="background-color: var(--accent-studio);"></div>
                    <span class="label">哔哩哔哩-次放Studio</span>
                </div>
                <span class="arrow">∟</span>
            </div>

            <div class="nav-item" onclick="handleNavigation('music', '水喝千束', 'https://qishui.douyin.com/s/ixoDJEgc/')">
                <div class="item-info">
                    <div class="dot" style="background-color: var(--accent-music);"></div>
                    <span class="label">汽水音乐-水喝千束</span>
                </div>
                <span class="arrow">∟</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <h3 id="modalTitle">提示</h3>
            <p id="modalBody"></p>
            <button class="modal-btn" id="confirmBtn">确认前往</button>
            <button class="modal-btn btn-secondary" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
